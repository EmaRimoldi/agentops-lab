experiment:
  name: autoresearch_cifar10_cnn4096_router_solver
  steps: 6
  visibility_regime: top1_only
  feedback_condition: ca
  candidate_generation: single
  selection_policy: top1
  prompt_template: autoresearch_program.txt
  branch_timeout_seconds: 1800
  incorrect_penalty: -1.0
  success_relative_improvement_threshold: 0.05
  stop_on_success: true
benchmark:
  id: autoresearch_cifar10
  template_path: autoresearch/benchmark/cifar10/workloads/cnn_compact.py
  profiles:
    - autoresearch_cifar10
output:
  root: autoresearch/runs/router_cnn4096_solver
models:
  include:
    - claude_haiku
    - claude_sonnet
    - claude_opus_4_6
