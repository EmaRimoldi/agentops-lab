<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" role="img" aria-labelledby="title desc">
  <title>Calibration Quality Snapshot</title>
  <desc>Deterministic calibration summary for d00 (single/no memory) vs d10 (single/external memory).</desc>
  <rect width="1000" height="420" fill="#f8fafc"/>
  <rect x="16" y="16" width="968" height="388" rx="20" fill="#ffffff" stroke="#dbe4ee"/>
  <text x="40" y="56" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Calibration Quality Snapshot</text>
  <text x="40" y="84" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">Deterministic calibration summary for d00 (single/no memory) vs d10 (single/external memory).</text>
  <text x="70" y="130" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Best-of-Rep Mean (lower is better)</text><text x="70" y="152" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">d00</text><rect x="70" y="170" width="320" height="28" rx="8" fill="#e2e8f0"/><rect x="70" y="170" width="281.4" height="28" rx="8" fill="#0f766e"/><text x="406" y="189" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0f172a">0.891</text><text x="70" y="227" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">d10</text><rect x="70" y="245" width="320" height="28" rx="8" fill="#e2e8f0"/><rect x="70" y="245" width="289.2" height="28" rx="8" fill="#b45309"/><text x="406" y="264" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0f172a">0.915</text><text x="500" y="130" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a">All-Runs Mean (lower is better)</text><text x="500" y="152" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">d00</text><rect x="500" y="170" width="320" height="28" rx="8" fill="#e2e8f0"/><rect x="500" y="170" width="316.8" height="28" rx="8" fill="#0f766e"/><text x="836" y="189" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0f172a">1.003</text><text x="500" y="227" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">d10</text><rect x="500" y="245" width="320" height="28" rx="8" fill="#e2e8f0"/><rect x="500" y="245" width="320.0" height="28" rx="8" fill="#b45309"/><text x="836" y="264" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0f172a">1.013</text><text x="70" y="360" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">Interpretation: the descriptive best-of-rep view and the stricter all-runs view both fail to show a d10 quality advantage.</text>
</svg>
