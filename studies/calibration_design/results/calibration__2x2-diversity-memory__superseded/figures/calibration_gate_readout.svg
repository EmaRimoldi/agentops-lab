<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="420" viewBox="0 0 1000 420" role="img" aria-labelledby="title desc">
  <title>Calibration Gate Readout</title>
  <desc>The descriptive best-of-rep view suggested a medium difference, but the stricter all-runs + accepted-mode gate remained effectively negative.</desc>
  <rect width="1000" height="420" fill="#f8fafc"/>
  <rect x="16" y="16" width="968" height="388" rx="20" fill="#ffffff" stroke="#dbe4ee"/>
  <text x="40" y="56" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700" fill="#0f172a">Calibration Gate Readout</text>
  <text x="40" y="84" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">The descriptive best-of-rep view suggested a medium difference, but the stricter all-runs + accepted-mode gate remained effectively negative.</text>
  <text x="70" y="128" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Decision Split</text><text x="70" y="154" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#475569">Positive values favor d00 here because d10 was worse on quality.</text><line x1="500" y1="180" x2="500" y2="310" stroke="#94a3b8" stroke-width="2"/><text x="70" y="221" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">Best-of-rep Cohen's d</text><rect x="500.0" y="201" width="145.6" height="28" rx="8" fill="#b91c1c"/><text x="659.6" y="221" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0f172a">0.662</text><text x="70" y="276" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#334155">All-runs Cohen's d</text><rect x="480.4" y="256" width="19.6" height="28" rx="8" fill="#0f766e"/><text x="416.4" y="276" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0f172a">-0.089</text><text x="70" y="350" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#0f172a">Accepted Modes With ≥2 Accepted Edits</text><rect x="70" y="370" width="120" height="28" rx="8" fill="#e2e8f0"/><rect x="70" y="370" width="60" height="28" rx="8" fill="#1d4ed8"/><text x="78" y="389" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">d00</text><text x="208" y="389" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0f172a">1</text><rect x="250" y="370" width="120" height="28" rx="8" fill="#e2e8f0"/><rect x="250" y="370" width="60" height="28" rx="8" fill="#7c3aed"/><text x="258" y="389" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#ffffff">d10</text><text x="388" y="389" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700" fill="#0f172a">1</text>
</svg>
