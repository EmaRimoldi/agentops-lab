<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AutoResearch Mini-Network Explorer</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #f8fafc;
      --fg: #111827;
      --muted: #64748b;
      --line: #cbd5e1;
      --soft: #e2e8f0;
      --card: #ffffff;
      --blue: #2563eb;
      --green: #16a34a;
      --purple: #7c3aed;
      --orange: #f97316;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0b1220;
        --fg: #e5e7eb;
        --muted: #94a3b8;
        --line: #334155;
        --soft: #1e293b;
        --card: #111827;
      }
    }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--fg);
    }
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 28px 18px 36px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: clamp(24px, 4vw, 42px);
      font-weight: 650;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }
    .tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 22px 0;
    }
    button {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px 14px;
      background: var(--card);
      color: var(--fg);
      font: inherit;
      cursor: pointer;
    }
    button[aria-pressed="true"] {
      background: var(--fg);
      color: var(--bg);
      border-color: var(--fg);
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 18px;
      align-items: start;
    }
    .panel {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: 18px 0 0;
    }
    .stat {
      border-top: 1px solid var(--soft);
      padding-top: 10px;
    }
    .label {
      color: var(--muted);
      font-size: 12px;
    }
    .value {
      margin-top: 2px;
      font-size: 18px;
      font-weight: 650;
    }
    svg {
      width: 100%;
      height: auto;
      display: block;
    }
    .node rect {
      fill: color-mix(in srgb, var(--accent) 12%, var(--card));
      stroke: var(--accent);
      stroke-width: 2;
      rx: 12;
    }
    .node text {
      fill: var(--fg);
      text-anchor: middle;
    }
    .node .sub {
      fill: var(--muted);
      font-size: 13px;
    }
    .edge {
      stroke: var(--line);
      stroke-width: 2.2;
      fill: none;
      marker-end: url(#arrow);
    }
    .signal {
      fill: var(--accent);
      opacity: 0.95;
    }
    .skip {
      stroke: var(--accent);
      stroke-width: 2.2;
      fill: none;
      stroke-dasharray: 5 5;
    }
    .detail h2 {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 650;
    }
    .layer-list {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }
    .layer {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 9px 10px;
      background: transparent;
    }
    .layer strong {
      display: block;
      font-size: 14px;
    }
    .layer span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
    }
    @media (max-width: 820px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>AutoResearch Mini-Network Explorer</h1>
    <p>Small CIFAR-10 models used as editable substrates for iterative agent research.</p>

    <div class="tabs" role="group" aria-label="Choose network">
      <button type="button" data-model="mlp" aria-pressed="true">MLP</button>
      <button type="button" data-model="cnn" aria-pressed="false">Compact CNN</button>
      <button type="button" data-model="resnet" aria-pressed="false">Micro ResNet</button>
    </div>

    <section class="layout">
      <div class="panel">
        <svg id="network" viewBox="0 0 920 360" role="img" aria-labelledby="network-title network-desc">
          <title id="network-title">Network architecture diagram</title>
          <desc id="network-desc">A block diagram of the selected AutoResearch CIFAR-10 model.</desc>
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M 0 0 L 10 5 L 0 10 z" fill="var(--line)"></path>
            </marker>
          </defs>
          <g id="edges"></g>
          <g id="skip"></g>
          <g id="nodes"></g>
          <circle id="signal" class="signal" r="8"></circle>
        </svg>
        <div class="stats">
          <div class="stat">
            <div class="label">Parameters</div>
            <div class="value" id="params"></div>
          </div>
          <div class="stat">
            <div class="label">Input</div>
            <div class="value">32x32x3</div>
          </div>
          <div class="stat">
            <div class="label">Output</div>
            <div class="value">10 classes</div>
          </div>
        </div>
      </div>
      <aside class="panel detail">
        <h2 id="model-title"></h2>
        <p id="model-text"></p>
        <div class="layer-list" id="layers"></div>
      </aside>
    </section>
  </main>

  <script>
    const models = {
      mlp: {
        title: "MLP",
        accent: "#7c3aed",
        params: "~669k",
        text: "Flattened CIFAR-10 image followed by two dense hidden layers. It is parameter-heavy relative to the CNNs because the first linear layer sees every pixel.",
        nodes: [
          ["Input", "32x32x3"],
          ["Flatten", "3072"],
          ["Linear", "192"],
          ["Linear", "384"],
          ["Classifier", "10"]
        ],
        layers: [
          ["Flatten", "Convert image tensor into a 3072-value vector."],
          ["Linear 3072 -> 192", "First dense representation."],
          ["Linear 192 -> 384", "Wider second representation."],
          ["Linear 384 -> 10", "Class logits for CIFAR-10."]
        ]
      },
      cnn: {
        title: "Compact CNN",
        accent: "#2563eb",
        params: "~77k",
        text: "Two convolutional blocks compress spatial structure before a small dense classifier. This is the most conventional CIFAR-10 baseline in the set.",
        nodes: [
          ["Input", "32x32x3"],
          ["Conv block", "3 -> 12"],
          ["Conv block", "12 -> 24"],
          ["Dense head", "1536 -> 48"],
          ["Classifier", "10"]
        ],
        layers: [
          ["Conv block 1", "3x3 conv, batch norm, ReLU, max pool."],
          ["Conv block 2", "3x3 conv, batch norm, ReLU, max pool."],
          ["Dense head", "Flattened feature map into 48 hidden units."],
          ["Classifier", "Class logits for CIFAR-10."]
        ]
      },
      resnet: {
        title: "Micro ResNet",
        accent: "#16a34a",
        params: "~2.6k",
        text: "A very small residual CNN. The skip connection makes it visually distinct and gives agents a different edit substrate.",
        nodes: [
          ["Input", "32x32x3"],
          ["Stem conv", "3 -> 8"],
          ["Residual", "8 channels"],
          ["Avg pool", "1x1"],
          ["Classifier", "10"]
        ],
        layers: [
          ["Stem conv", "3x3 conv, batch norm, ReLU."],
          ["Residual block", "Two 3x3 convs with an additive skip path."],
          ["Adaptive average pool", "Compress spatial map to one vector."],
          ["Classifier", "8 -> 32 -> 10 dense head."]
        ],
        skip: true
      }
    };

    const buttons = Array.from(document.querySelectorAll("button[data-model]"));
    const nodesRoot = document.getElementById("nodes");
    const edgesRoot = document.getElementById("edges");
    const skipRoot = document.getElementById("skip");
    const signal = document.getElementById("signal");
    const params = document.getElementById("params");
    const modelTitle = document.getElementById("model-title");
    const modelText = document.getElementById("model-text");
    const layers = document.getElementById("layers");

    function makeSvg(tag, attrs = {}) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([key, value]) => el.setAttribute(key, value));
      return el;
    }

    function render(key) {
      const model = models[key];
      document.documentElement.style.setProperty("--accent", model.accent);
      buttons.forEach((button) => button.setAttribute("aria-pressed", String(button.dataset.model === key)));
      nodesRoot.replaceChildren();
      edgesRoot.replaceChildren();
      skipRoot.replaceChildren();
      params.textContent = model.params;
      modelTitle.textContent = model.title;
      modelText.textContent = model.text;
      layers.replaceChildren(...model.layers.map(([title, text]) => {
        const item = document.createElement("div");
        item.className = "layer";
        item.innerHTML = `<strong>${title}</strong><span>${text}</span>`;
        return item;
      }));

      const xs = [105, 280, 455, 630, 805];
      const y = 165;
      xs.forEach((x, index) => {
        if (index < xs.length - 1) {
          edgesRoot.appendChild(makeSvg("path", { class: "edge", d: `M ${x + 62} ${y} L ${xs[index + 1] - 72} ${y}` }));
        }
      });
      if (model.skip) {
        skipRoot.appendChild(makeSvg("path", { class: "skip", d: `M 280 95 C 390 30, 520 30, 630 95` }));
      }
      model.nodes.forEach(([title, subtitle], index) => {
        const g = makeSvg("g", { class: "node", transform: `translate(${xs[index]}, ${y})` });
        const width = index === 0 || index === model.nodes.length - 1 ? 118 : 138;
        g.appendChild(makeSvg("rect", { x: -width / 2, y: -46, width, height: 92 }));
        const t1 = makeSvg("text", { y: -7, "font-size": "16", "font-weight": "650" });
        t1.textContent = title;
        const t2 = makeSvg("text", { class: "sub", y: 19 });
        t2.textContent = subtitle;
        g.appendChild(t1);
        g.appendChild(t2);
        nodesRoot.appendChild(g);
      });
      animate();
    }

    function animate() {
      const path = [105, 280, 455, 630, 805];
      let i = 0;
      clearInterval(window.__signalTimer);
      function tick() {
        signal.setAttribute("cx", path[i % path.length]);
        signal.setAttribute("cy", 165);
        i += 1;
      }
      tick();
      window.__signalTimer = setInterval(tick, 650);
    }

    buttons.forEach((button) => button.addEventListener("click", () => render(button.dataset.model)));
    render("mlp");
  </script>
</body>
</html>
